<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimerPro - 智能收银台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen">
        <!-- 登录提示 -->
        <div v-if="!isAuthenticated" class="min-h-screen flex items-center justify-center p-4">
            <div class="glass-card rounded-2xl w-full max-w-md p-8 text-center">
                <i class="ri-login-circle-line text-6xl text-indigo-500 mb-4"></i>
                <h1 class="text-2xl font-bold text-gray-800 mb-4">请先登录</h1>
                <p class="text-gray-600 mb-6">您需要登录后才能访问收银台</p>
                <a href="/login.html" class="btn-primary inline-block px-8 py-3 rounded-xl text-white font-semibold">立即登录</a>
            </div>
        </div>

        <!-- 主界面 -->
        <div v-else class="flex h-screen">
            <!-- 侧边栏 -->
            <aside class="w-64 bg-white shadow-lg flex flex-col">
                <div class="p-6 border-b border-gray-200">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                            <i class="ri-store-3-line text-white text-xl"></i>
                        </div>
                        <div>
                            <h2 class="font-bold text-gray-800">{{ user.shop?.shop_name }}</h2>
                            <p class="text-xs text-gray-500">{{ user.shop?.shop_code }}</p>
                        </div>
                    </div>
                </div>

                <nav class="flex-1 p-4 space-y-2">
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-50 text-indigo-600 font-medium">
                        <i class="ri-dashboard-line text-xl"></i>
                        <span>收银台</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition">
                        <i class="ri-history-line text-xl"></i>
                        <span>历史记录</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition">
                        <i class="ri-settings-3-line text-xl"></i>
                        <span>系统设置</span>
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-200">
                    <div class="flex items-center gap-3 px-4 py-3">
                        <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                            <i class="ri-user-line text-gray-500"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-800 truncate">{{ user.user?.real_name }}</p>
                            <p class="text-xs text-gray-500 truncate">{{ user.user?.username }}</p>
                        </div>
                        <button @click="logout" class="p-2 hover:bg-gray-100 rounded-lg transition">
                            <i class="ri-logout-box-r-line text-gray-500"></i>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- 主内容区 -->
            <main class="flex-1 flex flex-col overflow-hidden">
                <!-- 顶部栏 -->
                <header class="bg-white shadow-sm px-8 py-4 flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">收银台</h1>
                        <p class="text-sm text-gray-500">当前时间: {{ currentTime }}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 px-4 py-2 bg-green-50 rounded-lg">
                            <i class="ri-checkbox-circle-line text-green-500"></i>
                            <span class="font-medium text-green-700">{{ activeOrders }} 活跃订单</span>
                        </div>
                    </div>
                </header>

                <!-- 内容区 -->
                <div class="flex-1 p-8 overflow-y-auto">
                    <div class="glass-card rounded-2xl p-8 text-center">
                        <i class="ri-table-line text-6xl text-indigo-500 mb-4"></i>
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">欢迎使用 TimerPro 收银台</h2>
                        <p class="text-gray-600">多商家 SaaS 版本</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    isAuthenticated: false,
                    user: {
                        shop: null,
                        user: null
                    },
                    activeOrders: 0,
                    currentTime: '',
                    timer: null
                }
            },
            mounted() {
                this.checkAuth()
                this.updateTime()
                this.timer = setInterval(() => this.updateTime(), 1000)
            },
            beforeUnmount() {
                if (this.timer) clearInterval(this.timer)
            },
            methods: {
                checkAuth() {
                    const token = localStorage.getItem('access_token')
                    const userInfo = localStorage.getItem('user_info')

                    if (token && userInfo) {
                        this.user = JSON.parse(userInfo)
                        this.isAuthenticated = true
                        this.loadActiveOrders()
                    }
                },
                async loadActiveOrders() {
                    try {
                        const response = await fetch('/api/data/active', {
                            headers: {
                                'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                            }
                        })

                        if (response.ok) {
                            const data = await response.json()
                            this.activeOrders = data.g ? Object.keys(data.g).length : 0
                        } else {
                            this.handleAuthError()
                        }
                    } catch (error) {
                        console.error('加载订单失败:', error)
                    }
                },
                handleAuthError() {
                    localStorage.removeItem('access_token')
                    localStorage.removeItem('refresh_token')
                    localStorage.removeItem('user_info')
                    this.isAuthenticated = false
                    window.location.href = '/login.html'
                },
                logout() {
                    if (confirm('确定要退出登录吗？')) {
                        localStorage.removeItem('access_token')
                        localStorage.removeItem('refresh_token')
                        localStorage.removeItem('user_info')
                        window.location.href = '/login.html'
                    }
                },
                updateTime() {
                    this.currentTime = new Date().toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    })
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
